<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 372" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif">
  <style>
    .ink{fill:#0B0B0C}.ink2{fill:#3A3A3D}.st{stroke:#0B0B0C}
    @media (prefers-color-scheme:dark){.ink{fill:#ffffff}.ink2{fill:#c9c9cc}.st{stroke:#ffffff}}
    .box{fill:none;stroke-width:1.5}
  </style>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="4.5" refY="4" orient="auto">
      <path d="M1 1 L6 4 L1 7" fill="none" stroke="#A4561F" stroke-width="1.3"/>
    </marker>
  </defs>

  <text x="380" y="30" text-anchor="middle" font-size="19" font-weight="600" class="ink">The folder is the source of truth.</text>

  <!-- center: the folder -->
  <rect x="294" y="150" width="172" height="94" rx="11" fill="none" stroke="#A4561F" stroke-width="2"/>
  <text x="380" y="176" text-anchor="middle" font-size="13" font-weight="600" class="ink">📁  the folder</text>
  <line x1="316" y1="188" x2="444" y2="188" stroke="#A4561F" stroke-width="1" opacity="0.35"/>
  <text x="380" y="205" text-anchor="middle" font-size="10.5" class="ink2">request.md · goal.md</text>
  <text x="380" y="221" text-anchor="middle" font-size="10.5" class="ink2">deliverable.md · rules.md</text>
  <text x="380" y="237" text-anchor="middle" font-size="9" class="ink2" opacity="0.85">markdown · version-controlled · yours</text>

  <!-- board (top) -->
  <rect x="300" y="74" width="160" height="42" rx="9" class="box st"/>
  <text x="380" y="100" text-anchor="middle" font-size="12.5" class="ink">The board — a window</text>
  <line x1="380" y1="116" x2="380" y2="149" stroke="#A4561F" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>

  <!-- relay (right) -->
  <rect x="556" y="170" width="178" height="52" rx="9" fill="none" stroke="#A4561F" stroke-width="1.6"/>
  <text x="645" y="191" text-anchor="middle" font-size="12.5" class="ink">Relay — the AI operator</text>
  <text x="645" y="208" text-anchor="middle" font-size="9.5" class="ink2">clears the routine · escalates the rest</text>
  <line x1="467" y1="196" x2="555" y2="196" stroke="#A4561F" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>

  <!-- team (bottom) -->
  <rect x="300" y="278" width="160" height="42" rx="9" class="box st"/>
  <text x="380" y="304" text-anchor="middle" font-size="12.5" class="ink">You + your team</text>
  <line x1="380" y1="245" x2="380" y2="278" stroke="#A4561F" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>

  <!-- clients (left) -->
  <rect x="26" y="170" width="178" height="52" rx="9" class="box st"/>
  <text x="115" y="191" text-anchor="middle" font-size="12.5" class="ink">Clients — their portal</text>
  <text x="115" y="208" text-anchor="middle" font-size="9.5" class="ink2">ask · reply · approve</text>
  <line x1="205" y1="196" x2="293" y2="196" stroke="#A4561F" stroke-width="1.4" marker-start="url(#ar)" marker-end="url(#ar)"/>

  <text x="380" y="356" text-anchor="middle" font-size="11" class="ink2">The UI is a window · the AI is a worker · the folder is the business. If the app dies, the work lives.</text>
</svg>
